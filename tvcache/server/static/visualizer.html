<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVCache Prefix Tree Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            background: white;
            border: 1px solid #e0e0e0;
        }

        header {
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 400;
            color: #333;
        }

        .subtitle {
            margin-top: 0.5rem;
            color: #666;
            font-size: 0.9rem;
        }

        .header-link {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #0066cc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border: 1px solid #0066cc;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .header-link:hover {
            background: #0066cc;
            color: white;
        }

        .controls {
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button:hover { background: #555; }

        select {
            padding: 0.5rem 1rem;
            border: 1px solid #ccc;
            font-size: 0.9rem;
        }

        .status {
            margin-left: auto;
            padding: 0.5rem 1rem;
            background: #f5f5f5;
            color: #666;
            font-size: 0.85rem;
        }

        .status.error {
            background: #fee;
            color: #c33;
        }

        .content {
            padding: 2rem;
            min-height: 600px;
            overflow: hidden;
        }

        #tree-display {
            width: 100%;
            min-height: 500px;
            cursor: grab;
        }

        #tree-display:active { cursor: grabbing; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #868e96;
        }

        /* Tree Styles */
        .node-rect {
            fill: white;
            stroke: #FFB74D;
            stroke-width: 2px;
            transition: all 0.2s;
        }

        .node-rect.has-env {
            fill: white;
            stroke: #00BFFF;
            stroke-width: 2.5px;
        }

        .node-header-rect {
            fill: #f8f9fa;
            stroke: none;
        }

        .node-header-rect.has-env {
            fill: #e3f2fd;
        }

        .table-divider {
            stroke: #e0e0e0;
            stroke-width: 1px;
        }

        .node-text {
            font-size: 12px;
            fill: #333;
            pointer-events: none;
            dominant-baseline: middle;
        }

        .node-text.tool-call {
            font-weight: 600;
            font-size: 14px;
            fill: #1a1a1a;
        }

        .node-text.table-key {
            font-weight: 500;
            font-size: 11px;
            fill: #666;
        }

        .node-text.table-value {
            font-size: 11px;
            fill: #1a1a1a;
        }

        .link {
            fill: none;
            stroke: #ccc;
            stroke-width: 1.5px;
        }

        .node-group { cursor: pointer; }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 300px;
            word-wrap: break-word;
        }

        .tooltip.visible { opacity: 1; }

        .tooltip-label {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .tooltip-item {
            margin: 0.25rem 0;
            font-family: monospace;
            font-size: 0.8rem;
        }

        /* Save Dialog */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #333;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .modal-actions button {
            padding: 0.5rem 1.25rem;
        }

        .btn-secondary {
            background: #868e96;
        }

        .btn-secondary:hover {
            background: #6c757d;
        }

        /* Node Detail Modal */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .detail-modal.visible {
            display: flex;
        }

        .detail-modal-content {
            background: white;
            padding: 0;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .detail-modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #e0e0e0;
            background: #f8f9fa;
        }

        .detail-modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #333;
            margin: 0;
            word-break: break-word;
        }

        .detail-modal-body {
            padding: 1.5rem 2rem;
            overflow-y: auto;
            flex: 1;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .detail-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }

        .detail-item {
            display: flex;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 500;
            color: #666;
            min-width: 140px;
            font-size: 0.9rem;
        }

        .detail-value {
            color: #1a1a1a;
            font-size: 0.9rem;
            word-break: break-word;
            flex: 1;
        }

        .detail-value.env-id {
            color: #0066cc;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .detail-value.success {
            color: #4CAF50;
        }

        .detail-value.warning {
            color: #FF9800;
        }

        .detail-value.error {
            color: #F44336;
        }

        .detail-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .detail-badge.has-env {
            background: #e3f2fd;
            color: #0066cc;
        }

        .detail-badge.leaf {
            background: #f5f5f5;
            color: #666;
        }

        .detail-badge.internal {
            background: #fff3e0;
            color: #f57c00;
        }

        .detail-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #666;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            line-height: 1;
        }

        .detail-close-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/runs" class="header-link">View All Runs</a>
            <h1>TVCache Prefix Tree Visualizer</h1>
            <div class="subtitle">Interactive visualization of cached tool call histories</div>
        </header>

        <div class="controls">
            <button onclick="loadTree()">Refresh Tree</button>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <label for="task-select" style="color: #666; font-size: 0.9rem;">Task:</label>
                <select id="task-select" onchange="renderSelectedTask()">
                    <option value="">Select a task...</option>
                </select>
            </div>
            <button onclick="resetZoom()">Reset Zoom</button>
            <button onclick="showSaveDialog()">Save Tree</button>
            <div class="status" id="status">Ready</div>
        </div>

        <div class="content">
            <div id="tree-display"></div>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <!-- Node Detail Modal -->
    <div class="detail-modal" id="detailModal" onclick="closeDetailModal(event)">
        <div class="detail-modal-content" onclick="event.stopPropagation()">
            <div class="detail-modal-header">
                <button class="detail-close-btn" onclick="closeDetailModal()">&times;</button>
                <h2 id="detailNodeName">Node Details</h2>
            </div>
            <div class="detail-modal-body" id="detailModalBody">
                <!-- Content will be populated dynamically -->
            </div>
        </div>
    </div>

    <!-- Save Dialog -->
    <div class="modal" id="saveModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Save Tree</h2>
            </div>
            <form onsubmit="saveTree(event)">
                <div class="form-group">
                    <label for="run-name">Run Name</label>
                    <input type="text" id="run-name" placeholder="e.g., terminal-bench" required>
                </div>
                <div class="form-group">
                    <label for="epoch-number">Epoch Number</label>
                    <input type="number" id="epoch-number" placeholder="e.g., 5" required min="0">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeSaveDialog()">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let treeData = null;
        let currentTaskName = null;
        let svg, g, zoom;

        function getPathFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('path') || '';
        }

        async function loadTree() {
            const statusEl = document.getElementById('status');
            const displayEl = document.getElementById('tree-display');
            const taskSelect = document.getElementById('task-select');
            const path = getPathFromUrl();

            try {
                statusEl.textContent = 'Loading...';
                statusEl.className = 'status';

                const response = await fetch(`/visualize?path=${encodeURIComponent(path)}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Loaded data:', data);
                treeData = data;

                if (!data || Object.keys(data).length === 0) {
                    displayEl.innerHTML = '<div class="empty-state"><p>No cached data available</p></div>';
                    statusEl.textContent = 'No data';
                    taskSelect.innerHTML = '<option value="">No tasks available</option>';
                } else {
                    const taskNames = Object.keys(data);
                    taskSelect.innerHTML = '<option value="">Select a task...</option>' +
                        taskNames.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');

                    currentTaskName = taskNames[0];
                    taskSelect.value = currentTaskName;

                    const nodeCount = countNodes(data);
                    const envNodeCount = countNodesWithEnv(data);
                    statusEl.textContent = `Loaded ${Object.keys(data).length} task(s), ${nodeCount} node(s), ${envNodeCount} with env`;

                    renderSelectedTask();
                }
            } catch (error) {
                console.error('Error loading tree:', error);
                statusEl.textContent = `Error: ${error.message}`;
                statusEl.className = 'status error';
                
                // If loading from a file path failed, offer to load current cache
                if (path) {
                    displayEl.innerHTML = `
                        <div class="empty-state">
                            <p>Failed to load tree data from file</p>
                            <p style="margin-top: 0.5rem; font-size: 0.85rem; color: #666;">${error.message}</p>
                            <button onclick="window.location.href='/'" style="margin-top: 1rem;">View Current Cache</button>
                        </div>
                    `;
                } else {
                    displayEl.innerHTML = `<div class="empty-state"><p>Failed to load tree data</p></div>`;
                }
            }
        }

        function renderSelectedTask() {
            const taskSelect = document.getElementById('task-select');
            const selectedTask = taskSelect.value;

            if (!selectedTask || !treeData || !treeData[selectedTask]) {
                document.getElementById('tree-display').innerHTML = '<div class="empty-state"><p>Please select a task to visualize</p></div>';
                return;
            }

            currentTaskName = selectedTask;
            renderD3Tree(selectedTask, treeData[selectedTask]);
        }

        function renderD3Tree(taskName, rootNode) {
            const displayEl = document.getElementById('tree-display');
            displayEl.innerHTML = '';

            const hierarchyData = convertToHierarchy(rootNode, 'ROOT');

            if (!hierarchyData.children || hierarchyData.children.length === 0) {
                displayEl.innerHTML = `<div class="empty-state"><p>No tool calls cached for task: ${escapeHtml(taskName)}</p></div>`;
                return;
            }

            const margin = { top: 40, right: 120, bottom: 40, left: 120 };
            const width = Math.max(1200, displayEl.clientWidth);
            const nodeWidth = 320;
            const nodeHeight = 200;
            const verticalSpacing = 250;

            // Create SVG with zoom
            svg = d3.select('#tree-display')
                .append('svg')
                .attr('width', width)
                .style('overflow', 'visible');

            zoom = d3.zoom()
                .scaleExtent([0.1, 3])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            g = svg.append('g');

            const treeLayout = d3.tree().nodeSize([nodeWidth + 40, verticalSpacing]);
            const root = d3.hierarchy(hierarchyData);
            const treeDataLayout = treeLayout(root);

            const height = (treeDataLayout.height + 1) * verticalSpacing + margin.top + margin.bottom;
            svg.attr('height', height);

            const bounds = calculateBounds(treeDataLayout);
            const xOffset = (width - margin.left - margin.right) / 2 - (bounds.minX + bounds.maxX) / 2;
            const initialTransform = d3.zoomIdentity.translate(margin.left + xOffset, margin.top);
            svg.call(zoom.transform, initialTransform);

            // Links
            g.selectAll('.link')
                .data(treeDataLayout.links())
                .enter()
                .append('path')
                .attr('class', 'link')
                .attr('d', d => `M ${d.source.x},${d.source.y + nodeHeight / 2}
                                 L ${d.source.x},${d.source.y + nodeHeight / 2 + 30}
                                 L ${d.target.x},${d.target.y - nodeHeight / 2 - 30}
                                 L ${d.target.x},${d.target.y - nodeHeight / 2}`);

            // Nodes
            const nodes = g.selectAll('.node-group')
                .data(treeDataLayout.descendants())
                .enter()
                .append('g')
                .attr('class', 'node-group')
                .attr('transform', d => `translate(${d.x},${d.y})`)
                .on('click', function(event, d) {
                    event.stopPropagation();
                    showDetailModal(d);
                })
                .on('mouseenter', function(event, d) {
                    const node = d3.select(this);
                    node.select('rect').attr('stroke', '#333').attr('stroke-width', 3);
                    node.transition().duration(200).attr('transform', `translate(${d.x},${d.y}) scale(1.15)`);
                    showTooltip(event, d);
                })
                .on('mouseleave', function(event, d) {
                    const node = d3.select(this);
                    const originalStroke = d.data.env_id ? '#00BFFF' : '#FFB74D';
                    const originalWidth = d.data.env_id ? 2.5 : 2;
                    node.select('rect').attr('stroke', originalStroke).attr('stroke-width', originalWidth);
                    node.transition().duration(200).attr('transform', `translate(${d.x},${d.y}) scale(1)`);
                    hideTooltip();
                });

            // Main border rectangle
            nodes.append('rect')
                .attr('class', d => {
                    const hasEnv = d.data.env_id ? 'has-env' : '';
                    return `node-rect ${hasEnv}`.trim();
                })
                .attr('x', -nodeWidth / 2)
                .attr('y', -nodeHeight / 2)
                .attr('width', nodeWidth)
                .attr('height', nodeHeight)
                .attr('rx', 8)
                .attr('ry', 8);

            // Header background
            const headerHeight = 32;
            nodes.append('rect')
                .attr('class', d => {
                    const hasEnv = d.data.env_id ? 'has-env' : '';
                    return `node-header-rect ${hasEnv}`.trim();
                })
                .attr('x', -nodeWidth / 2)
                .attr('y', -nodeHeight / 2)
                .attr('width', nodeWidth)
                .attr('height', headerHeight)
                .attr('rx', 8)
                .attr('ry', 8);

            // Header divider
            nodes.append('line')
                .attr('class', 'table-divider')
                .attr('x1', -nodeWidth / 2)
                .attr('y1', -nodeHeight / 2 + headerHeight)
                .attr('x2', nodeWidth / 2)
                .attr('y2', -nodeHeight / 2 + headerHeight);

            // Tool call name (header)
            nodes.append('text')
                .attr('class', 'node-text tool-call')
                .attr('text-anchor', 'middle')
                .attr('y', -nodeHeight / 2 + headerHeight / 2)
                .each(function(d) {
                    const text = d.data.name;
                    const maxLength = 30;
                    d3.select(this).text(text.length > maxLength ? text.substring(0, maxLength) + '...' : text);
                });

            // Build table rows
            nodes.each(function(d) {
                const node = d3.select(this);
                const tableStartY = -nodeHeight / 2 + headerHeight + 8;
                const rowHeight = 20;
                const keyX = -nodeWidth / 2 + 12;
                const valueX = -nodeWidth / 2 + 100;
                const dividerX = -nodeWidth / 2 + 95;
                let currentRow = 0;

                // Create rows array
                const rows = [];

                if (d.data.env_id) {
                    rows.push({ key: 'Env ID', value: d.data.env_id, color: '#0066cc' });
                }

                if (d.data.value !== null && d.data.value !== undefined) {
                    rows.push({ key: 'Value', value: d.data.value, color: '#333' });
                }

                if (d.data.tool_exec_time !== null && d.data.tool_exec_time !== undefined) {
                    rows.push({ key: 'Exec Time', value: d.data.tool_exec_time.toFixed(3) + 's', color: '#0066cc' });
                }

                if (d.data.test_result !== null && d.data.test_result !== undefined) {
                    rows.push({ key: 'Test Result', value: d.data.test_result, color: '#009688' });
                }

                rows.push({ key: 'Cache Hits', value: d.data.cache_hits || 0, color: '#FF5722' });
                rows.push({ key: 'Prefix Hits', value: d.data.prefix_hits || 0, color: '#4CAF50' });
                
                if (d.data.stateless !== null && d.data.stateless !== undefined) {
                    rows.push({ key: 'Stateless', value: d.data.stateless ? 'Yes' : 'No', color: d.data.stateless ? '#4CAF50' : '#999' });
                }

                // Render rows
                rows.forEach((row, idx) => {
                    const y = tableStartY + idx * rowHeight;

                    // Vertical divider between columns
                    node.append('line')
                        .attr('class', 'table-divider')
                        .attr('x1', dividerX)
                        .attr('y1', y - rowHeight / 2 + 2)
                        .attr('x2', dividerX)
                        .attr('y2', y + rowHeight / 2 - 2);

                    // Key (left column)
                    node.append('text')
                        .attr('class', 'node-text table-key')
                        .attr('text-anchor', 'start')
                        .attr('x', keyX)
                        .attr('y', y)
                        .text(row.key);

                    // Value (right column)
                    node.append('text')
                        .attr('class', 'node-text table-value')
                        .attr('text-anchor', 'start')
                        .attr('x', valueX)
                        .attr('y', y)
                        .style('fill', row.color)
                        .each(function() {
                            const text = String(row.value);
                            const maxLength = 25;
                            d3.select(this).text(text.length > maxLength ? text.substring(0, maxLength) + '...' : text);
                        });

                    // Horizontal divider
                    if (idx < rows.length - 1) {
                        node.append('line')
                            .attr('class', 'table-divider')
                            .attr('x1', -nodeWidth / 2 + 8)
                            .attr('y1', y + rowHeight / 2)
                            .attr('x2', nodeWidth / 2 - 8)
                            .attr('y2', y + rowHeight / 2);
                    }
                });
            });
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            let html = `<div class="tooltip-label">${d.data.name}</div>`;

            if (d.data.env_id) {
                html += `<div class="tooltip-item">env_id: ${d.data.env_id}</div>`;
            }

            if (d.data.value !== null && d.data.value !== undefined) {
                html += `<div class="tooltip-item">value: ${d.data.value}</div>`;
            }

            if (d.data.tool_exec_time !== null && d.data.tool_exec_time !== undefined) {
                html += `<div class="tooltip-item">execution time: ${d.data.tool_exec_time.toFixed(3)}s</div>`;
            }

            if (d.data.test_result !== null && d.data.test_result !== undefined) {
                html += `<div class="tooltip-item">test result: ${d.data.test_result}</div>`;
            }

            html += `<div class="tooltip-item">cache hits: ${d.data.cache_hits || 0}</div>`;
            html += `<div class="tooltip-item">prefix hits: ${d.data.prefix_hits || 0}</div>`;
            
            if (d.data.stateless !== null && d.data.stateless !== undefined) {
                html += `<div class="tooltip-item">stateless: ${d.data.stateless ? 'Yes' : 'No'}</div>`;
            }

            const childCount = d.children ? d.children.length : 0;
            html += `<div class="tooltip-item">children: ${childCount}</div>`;
            html += `<div class="tooltip-item">type: ${childCount > 0 ? 'internal' : 'leaf'}</div>`;

            tooltip.innerHTML = html;
            tooltip.style.left = event.pageX + 15 + 'px';
            tooltip.style.top = event.pageY + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        function showDetailModal(d) {
            const modal = document.getElementById('detailModal');
            const modalBody = document.getElementById('detailModalBody');
            const nodeName = document.getElementById('detailNodeName');
            
            // Set node name
            nodeName.textContent = d.data.name;
            
            // Build detailed content
            let html = '';
            
            // Basic Information Section
            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Basic Information</div>';
            
            html += '<div class="detail-item">';
            html += '<div class="detail-label">Tool Call</div>';
            html += `<div class="detail-value">${escapeHtml(d.data.name)}</div>`;
            html += '</div>';
            
            const childCount = d.children ? d.children.length : 0;
            const nodeType = childCount > 0 ? 'internal' : 'leaf';
            html += '<div class="detail-item">';
            html += '<div class="detail-label">Node Type</div>';
            html += `<div class="detail-value"><span class="detail-badge ${nodeType}">${nodeType.toUpperCase()}</span></div>`;
            html += '</div>';
            
            html += '<div class="detail-item">';
            html += '<div class="detail-label">Children Count</div>';
            html += `<div class="detail-value">${childCount}</div>`;
            html += '</div>';
            
            if (d.depth !== undefined) {
                html += '<div class="detail-item">';
                html += '<div class="detail-label">Depth</div>';
                html += `<div class="detail-value">${d.depth}</div>`;
                html += '</div>';
            }
            
            html += '</div>'; // End Basic Information
            
            // Environment & Execution Section
            if (d.data.env_id || d.data.tool_exec_time !== null || d.data.value !== null) {
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">Environment & Execution</div>';
                
                if (d.data.env_id) {
                    html += '<div class="detail-item">';
                    html += '<div class="detail-label">Environment ID</div>';
                    html += `<div class="detail-value env-id"><span class="detail-badge has-env">HAS ENV</span><br/>${escapeHtml(d.data.env_id)}</div>`;
                    html += '</div>';
                }
                
                if (d.data.tool_exec_time !== null && d.data.tool_exec_time !== undefined) {
                    html += '<div class="detail-item">';
                    html += '<div class="detail-label">Execution Time</div>';
                    html += `<div class="detail-value">${d.data.tool_exec_time.toFixed(3)} seconds</div>`;
                    html += '</div>';
                }
                
                if (d.data.value !== null && d.data.value !== undefined) {
                    html += '<div class="detail-item">';
                    html += '<div class="detail-label">Return Value</div>';
                    html += `<div class="detail-value" style="font-family: monospace; font-size: 0.85rem; max-height: 200px; overflow-y: auto;">${escapeHtml(String(d.data.value))}</div>`;
                    html += '</div>';
                }
                
                html += '</div>'; // End Environment & Execution
            }
            
            // Cache Statistics Section
            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Cache Statistics</div>';
            
            html += '<div class="detail-item">';
            html += '<div class="detail-label">Cache Hits</div>';
            html += `<div class="detail-value" style="color: #FF5722; font-weight: 600;">${d.data.cache_hits || 0}</div>`;
            html += '</div>';
            
            html += '<div class="detail-item">';
            html += '<div class="detail-label">Prefix Hits</div>';
            html += `<div class="detail-value" style="color: #4CAF50; font-weight: 600;">${d.data.prefix_hits || 0}</div>`;
            html += '</div>';
            
            if (d.data.stateless !== null && d.data.stateless !== undefined) {
                html += '<div class="detail-item">';
                html += '<div class="detail-label">Stateless</div>';
                const statelessValue = d.data.stateless ? 'Yes' : 'No';
                const statelessClass = d.data.stateless ? 'success' : '';
                html += `<div class="detail-value ${statelessClass}">${statelessValue}</div>`;
                html += '</div>';
            }
            
            html += '</div>'; // End Cache Statistics
            
            // Test Results Section
            if (d.data.test_result !== null && d.data.test_result !== undefined) {
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">Test Results</div>';
                
                html += '<div class="detail-item">';
                html += '<div class="detail-label">Test Result</div>';
                const testResultClass = String(d.data.test_result).toLowerCase().includes('pass') ? 'success' : 
                                       String(d.data.test_result).toLowerCase().includes('fail') ? 'error' : '';
                html += `<div class="detail-value ${testResultClass}">${escapeHtml(String(d.data.test_result))}</div>`;
                html += '</div>';
                
                html += '</div>'; // End Test Results
            }
            
            // Tree Path Section
            if (d.ancestors) {
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">Tree Path</div>';
                
                html += '<div class="detail-item">';
                html += '<div class="detail-label">Path from Root</div>';
                const pathNames = d.ancestors().reverse().map(n => n.data.name).join(' → ');
                html += `<div class="detail-value" style="font-size: 0.85rem; word-break: break-all;">${escapeHtml(pathNames)}</div>`;
                html += '</div>';
                
                html += '</div>'; // End Tree Path
            }
            
            modalBody.innerHTML = html;
            modal.classList.add('visible');
        }

        function closeDetailModal(event) {
            // Only close if clicking the backdrop or close button
            if (!event || event.target.id === 'detailModal' || event.type === 'click') {
                document.getElementById('detailModal').classList.remove('visible');
            }
        }

        // Close modal on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeDetailModal();
            }
        });

        function resetZoom() {
            if (svg && zoom) {
                svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
            }
        }

        function convertToHierarchy(node, name) {
            const children = [];
            for (const [toolCall, childNode] of Object.entries(node.children)) {
                children.push(convertToHierarchy(childNode, toolCall));
            }
            return {
                name: name,
                env_id: node.env_id,
                value: node.value,
                tool_exec_time: node.tool_exec_time,
                test_result: node.test_result,
                cache_hits: node.cache_hits,
                prefix_hits: node.prefix_hits,
                stateless: node.stateless,
                children: children.length > 0 ? children : undefined
            };
        }

        function calculateBounds(root) {
            let minX = Infinity, maxX = -Infinity;
            root.each(d => {
                if (d.x < minX) minX = d.x;
                if (d.x > maxX) maxX = d.x;
            });
            return { minX, maxX };
        }

        function countNodes(data) {
            let count = 0;
            function countNodeRecursive(node) {
                for (const child of Object.values(node.children)) {
                    count++;
                    countNodeRecursive(child);
                }
            }
            for (const rootNode of Object.values(data)) {
                countNodeRecursive(rootNode);
            }
            return count;
        }

        function countNodesWithEnv(data) {
            let count = 0;
            function countNodeRecursive(node) {
                if (node.env_id) {
                    count++;
                }
                for (const child of Object.values(node.children)) {
                    countNodeRecursive(child);
                }
            }
            for (const rootNode of Object.values(data)) {
                countNodeRecursive(rootNode);
            }
            return count;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showSaveDialog() {
            const path = getPathFromUrl();
            
            // Only allow saving when viewing current cache (no path parameter)
            if (path) {
                alert('Cannot save file-based trees. This button only works for the current cache state.');
                return;
            }

            if (!treeData || Object.keys(treeData).length === 0) {
                alert('No data to save. Please load the tree first.');
                return;
            }

            document.getElementById('saveModal').classList.add('visible');
        }

        function closeSaveDialog() {
            document.getElementById('saveModal').classList.remove('visible');
            document.getElementById('run-name').value = '';
            document.getElementById('epoch-number').value = '';
        }

        async function saveTree(event) {
            event.preventDefault();
            
            const runName = document.getElementById('run-name').value.trim();
            const epochNumber = document.getElementById('epoch-number').value.trim();
            const statusEl = document.getElementById('status');

            if (!runName || !epochNumber) {
                alert('Please fill in all fields.');
                return;
            }

            try {
                statusEl.textContent = 'Saving...';
                statusEl.className = 'status';

                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        run_name: runName,
                        epoch: parseInt(epochNumber),
                        data: treeData
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    statusEl.textContent = `Saved successfully! View in runs list`;
                    statusEl.className = 'status';
                    closeSaveDialog();
                    
                    // Optionally redirect to the saved file
                    setTimeout(() => {
                        const action = confirm('Tree saved successfully!\n\nChoose an option:\n- OK: View the saved file\n- Cancel: Stay on current cache view');
                        if (action) {
                            window.location.href = `/visualizer.html?path=${result.relative_path}`;
                        }
                    }, 300);
                } else {
                    throw new Error(result.error || 'Failed to save tree');
                }
            } catch (error) {
                console.error('Error saving tree:', error);
                statusEl.textContent = `Error: ${error.message}`;
                statusEl.className = 'status error';
            }
        }

        window.addEventListener('DOMContentLoaded', loadTree);
    </script>
</body>
</html>
